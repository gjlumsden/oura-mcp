name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  # ── Build & Test ───────────────────────────────────────
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.VERSION }} -p:AssemblyVersion=${{ steps.version.outputs.VERSION }} -p:FileVersion=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack with version
        run: dotnet pack src/OuraMcp/OuraMcp.csproj --no-build -c Release -o ./nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      - name: Upload unsigned package
        uses: actions/upload-artifact@v4
        with:
          name: nupkg-unsigned
          path: ./nupkg/*.nupkg

  # ── Sign (via centralised code-signing repo) ───────────
  sign:
    needs: build
    uses: gjlumsden/code-signing/.github/workflows/sign.yml@main
    with:
      artifact-name: nupkg-unsigned
      file-filter: '*.nupkg'

  # ── Publish & Release ──────────────────────────────────
  publish:
    needs: sign
    runs-on: ubuntu-latest

    steps:
      - name: Download signed package
        uses: actions/download-artifact@v4
        with:
          name: nupkg-unsigned-signed
          path: ./nupkg

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.x'

      - name: Verify NuGet signature
        run: dotnet nuget verify ./nupkg/*.nupkg || echo "::warning::Signature verification failed — package may not be signed yet (identity validation pending)"

      - name: NuGet login (Trusted Publishing via OIDC)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: gjlumsden

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source https://www.nuget.org/api/v2/package --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true
