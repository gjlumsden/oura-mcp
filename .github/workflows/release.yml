name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Extract version from tag
        id: version
        run: |
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT
          echo "Extracted version: $VERSION"

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore -c Release -p:Version=${{ steps.version.outputs.VERSION }} -p:AssemblyVersion=${{ steps.version.outputs.VERSION }} -p:FileVersion=${{ steps.version.outputs.VERSION }}

      - name: Test
        run: dotnet test --no-build -c Release

      - name: Pack with version
        run: dotnet pack src/OuraMcp/OuraMcp.csproj --no-build -c Release -o ./nupkg -p:Version=${{ steps.version.outputs.VERSION }}

      # TODO: Add Azure Trusted Signing when identity validation is complete
      # - name: Install signing tool
      #   run: dotnet tool install --global sign
      # - name: Azure login
      #   uses: azure/login@v2
      #   with:
      #     client-id: ${{ secrets.AZURE_CLIENT_ID }}
      #     tenant-id: ${{ secrets.AZURE_TENANT_ID }}
      #     subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      # - name: Sign NuGet package
      #   run: |
      #     sign code trusted-signing ./nupkg/*.nupkg `
      #       --trusted-signing-endpoint ${{ secrets.SIGNING_ENDPOINT }} `
      #       --trusted-signing-account ${{ secrets.SIGNING_ACCOUNT }} `
      #       --trusted-signing-certificate-profile ${{ secrets.SIGNING_CERT_PROFILE }}

      - name: NuGet login (Trusted Publishing via OIDC)
        uses: NuGet/login@v1
        id: nuget_login
        with:
          user: gjlumsden

      - name: Publish to NuGet
        run: dotnet nuget push ./nupkg/*.nupkg --api-key "${{ steps.nuget_login.outputs.NUGET_API_KEY }}" --source https://www.nuget.org/api/v2/package --skip-duplicate

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./nupkg/*.nupkg
          generate_release_notes: true
